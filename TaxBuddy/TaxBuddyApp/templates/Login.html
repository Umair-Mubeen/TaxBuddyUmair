{% extends "base.html" %}
{% load static %}
{% block title %}Login | TaxBuddy Umair{% endblock %}
{% block robots %}noindex, nofollow{% endblock %}

{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 1rem 40px;background:var(--navy)">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:28px">
      <a href="{% url 'index' %}" style="font-family:'Playfair Display',serif;font-size:24px;font-style:italic;font-weight:700;color:#fff">Tax<em style="color:var(--green)">Buddy</em> Umair</a>
      <p style="color:rgba(255,255,255,.45);font-size:13px;margin-top:6px">Admin Dashboard</p>
    </div>
    <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:2rem">
      <form method="POST" action="{% url 'Login' %}">
        {% csrf_token %}
        <div style="margin-bottom:14px">
          <label style="display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Username</label>
          <input type="text" name="username" required autofocus autocomplete="username" placeholder="Enter username" style="width:100%;padding:11px 14px;font-family:'Inter',sans-serif;font-size:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:var(--radius-sm);outline:none;color:#fff">
        </div>
        <div style="margin-bottom:20px">
          <label style="display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Password</label>
          <input type="password" name="password" required autocomplete="current-password" placeholder="Enter password" style="width:100%;padding:11px 14px;font-family:'Inter',sans-serif;font-size:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:var(--radius-sm);outline:none;color:#fff">
        </div>
        <button type="submit" style="width:100%;background:var(--green);color:var(--navy);font-family:'Inter',sans-serif;font-size:14px;font-weight:700;padding:13px;border-radius:var(--radius-sm);border:none;cursor:pointer;min-height:48px;transition:all .2s">Login →</button>
      </form>
    </div>
    <div style="text-align:center;margin-top:16px">
      <a href="{% url 'index' %}" style="font-size:13px;color:rgba(255,255,255,.4);transition:color .15s" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='rgba(255,255,255,.4)'">← Back to website</a>
    </div>
  </div>
</div>
{% endblock %}
